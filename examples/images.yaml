# cua-house-server image catalog example.
#
# For the full catalog currently used in production, see
# packages/server/src/cua_house_server/config/defaults/images.yaml —
# that's the source of truth and what the clone-worker.sh script copies
# to new workers by default.
#
# This file is a minimal template for operators creating a custom
# catalog. Each image key can appear under `local:` (nested-KVM worker
# runtime), `gcp:` (transient GCE VM runtime), or both.

images:

  # Canonical CPU-only Windows image. local.template_qcow2_path is where
  # the qcow2 lives on the host filesystem; if missing and gcs_uri is
  # set, the worker pulls it during startup prewarm.
  cpu-free:
    enabled: true
    os_family: windows            # windows | linux
    published_ports: [5000]       # guest TCP ports the image exposes
    local:
      template_qcow2_path: /mnt/xfs/images/cpu-free/cpu-free-20260415.qcow2
      gcs_uri: gs://agenthle-images/templates/cpu-free/cpu-free-20260415.qcow2
      # Bump when re-baking the qcow2 — the worker's snapshot cache keys
      # off (image, version, vcpus, memory_gb, disk_gb), so a new version
      # forces a fresh cold boot + savevm the next time a VM of this shape
      # is added. The savevm is automatic: on first cache miss the server
      # cold-boots the VM, waits for readiness, then creates a shape-based
      # snapshot tag (e.g. 4vcpu-8gb-64gb). No manual savevm is required.
      # Convention: bake date (YYYYMMDD).
      version: "20260415"
      default_vcpus: 4
      default_memory_gb: 8
    gcp:
      project: sunblaze-4
      zone: us-central1-a
      network: agenthle-vpc
      service_account: agenthle-vm-service@sunblaze-4.iam.gserviceaccount.com
      boot_snapshot: agenthle-dev-cpu-free-agents-baked-20260405
      boot_disk_gb: 64
      default_machine_type: e2-standard-2
