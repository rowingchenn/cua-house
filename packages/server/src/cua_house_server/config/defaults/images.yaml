images:
  cpu-free:
    enabled: true
    os_family: windows
    published_ports: [5000]
    local:
      template_qcow2_path: /home/weichenzhang/agenthle-env-images/cpu-free/cpu-free-20260413.qcow2
      gcs_uri: gs://agenthle-images/templates/cpu-free/cpu-free-20260413.qcow2
      version: "20260413"  # bump when re-baking; invalidates worker snapshot cache
      default_vcpus: 4
      default_memory_gb: 8
    gcp:
      project: sunblaze-4
      zone: us-central1-a
      network: agenthle-vpc
      service_account: agenthle-vm-service@sunblaze-4.iam.gserviceaccount.com
      boot_snapshot: agenthle-dev-cpu-free-agents-baked-20260405
      boot_disk_gb: 64
      default_machine_type: e2-standard-2
      max_concurrent_vms: 4

  cpu-license:
