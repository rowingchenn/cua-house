[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cua-house-client"
version = "0.1.1"
description = "Python client SDK for cua-house server"
requires-python = ">=3.12,<3.14"
license = { text = "MIT" }
dependencies = [
    "cua-house-common",
    "httpx>=0.27.0",
]

[tool.uv.sources]
cua-house-common = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cua_house_client"]
