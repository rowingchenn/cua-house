[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cua-house-common"
version = "0.1.1"
description = "Shared models and utilities for cua-house"
requires-python = ">=3.12,<3.14"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cua_house_common"]
